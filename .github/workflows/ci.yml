name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Run the full pytest + ruff + JS syntax suite on every platform we
    # support so a Windows-only regression (path sanitisation, chmod fd,
    # subprocess CLI lookup) can't slip through a Linux-only check.
    # fail-fast off so a transient flake on one OS doesn't mask real
    # failures on the others.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        # setup-python's built-in `cache: pip` handles the per-OS cache
        # path (~/.cache/pip on Linux, ~/Library/Caches/pip on macOS,
        # %LOCALAPPDATA%\pip\Cache on Windows) so we don't have to fan a
        # matrix variable through actions/cache.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        # F (pyflakes) catches real undefined-name / unused-import / shadowing
        # bugs. B (bugbear) catches real footguns. E/W are PEP-8 style; we
        # ignore E501 (line length) since long URLs/strings are unavoidable
        # and B008 (function-call-in-default-arg) since FastAPI's idiom uses
        # `Depends(...)`/`Form(...)` defaults pervasively. SIM is intentionally
        # skipped because SIM105 flags equivalent try/except/pass patterns the
        # project uses on purpose; if a SIM check ever catches a real bug,
        # add it back here.
        run: ruff check app.py auth.py setup_flow.py --select=F,E,W,B --ignore=E501,B008
      - name: Tests (pytest)
        run: pytest -q
      - name: JS syntax check
        # `node --check` is the same command on every platform; the
        # default shell on windows-latest is PowerShell, which accepts
        # this exactly as written (no shebangs needed).
        run: |
          node --check static/app.js
          node --check static/setup.js
          node --check static/account.js
