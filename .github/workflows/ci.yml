name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        # F (pyflakes) catches real undefined-name / unused-import / shadowing
        # bugs. B (bugbear) catches real footguns. E/W are PEP-8 style; we
        # ignore E501 (line length) since long URLs/strings are unavoidable
        # and B008 (function-call-in-default-arg) since FastAPI's idiom uses
        # `Depends(...)`/`Form(...)` defaults pervasively. SIM is intentionally
        # skipped because SIM105 flags equivalent try/except/pass patterns the
        # project uses on purpose; if a SIM check ever catches a real bug,
        # add it back here.
        run: ruff check app.py auth.py setup_flow.py --select=F,E,W,B --ignore=E501,B008
      - name: Tests (pytest)
        run: pytest -q
      - name: JS syntax check
        run: |
          node --check static/app.js
          node --check static/setup.js
