services:
  claude-web:
    # Pull the published image from GHCR (recommended):
    image: ghcr.io/matalvernaz/claude-web:latest
    # Or build from source if you're hacking on this checkout:
    # build: .
    container_name: claude-web
    restart: unless-stopped
    env_file: .env
    environment:
      # The directory Claude Code treats as its project root. Must match the
      # mount below.
      CLAUDE_PROJECT_DIR: /workspace
    volumes:
      # The tree Claude can read/write/run in.
      - ./workspace:/workspace
      # Claude Code's per-user state: API key/OAuth, sessions, settings, MCP, hooks.
      - ./claude-home:/home/claude/.claude
      # claude-web's own state: usage log, persisted runs/events, uploads.
      - ./claude-web-state:/home/claude/.claude-web
      # Shared Codex configuration, rollout history, and optional host-level
      # OpenAI login.
      - ./codex-home:/home/claude/.codex
      # Per-user personal-account credentials. Each signed-in user can add
      # their own labeled Claude accounts via the /account page; each one
      # gets a subdirectory here keyed by user-sub and credential id, with
      # its own .credentials.json. Everything else in the directory is a
      # symlink back to the shared claude-home so transcripts/sessions stay
      # shared across slot toggles. Omit this mount if you don't need
      # per-user accounts.
      - ./claude-homes:/home/claude/.claude-homes
      # Per-user ChatGPT-plan credentials and private Codex indexes. Each
      # account links sessions/ back to codex-home so account changes resume
      # the same thread instead of splitting the chat.
      - ./codex-homes:/home/claude/.codex-homes
    # Bind to localhost only — your reverse proxy (Traefik / nginx / Caddy /
    # oauth2-proxy) terminates TLS and forwards to this port. If you're not
    # behind a proxy, drop "127.0.0.1:" to expose the port directly (and set
    # SESSION_COOKIE_INSECURE=true for HTTP, which is unsafe over a network).
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:3001/healthz\").status==200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
