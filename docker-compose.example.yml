services:
  claude-web:
    image: ghcr.io/YOUR_GH_USER/claude-web:latest
    # Or build from source:
    # build: .
    container_name: claude-web
    restart: unless-stopped
    env_file: .env
    environment:
      # Required when AUTH_MODE=oidc.
      AUTH_MODE: oidc
      OIDC_ISSUER_URL: https://auth.example.com/realms/main
      OIDC_CLIENT_ID: claude-web
      # OIDC_CLIENT_SECRET set in .env (don't commit)
      OIDC_REDIRECT_URI: https://claude.example.com/auth/callback
      # OIDC_ALLOWED_EMAILS: you@example.com,partner@example.com
      # SESSION_SECRET set in .env

      # The directory Claude Code treats as its project root.
      CLAUDE_PROJECT_DIR: /workspace
    volumes:
      # The tree Claude can read/write/run in.
      - ./workspace:/workspace
      # Claude Code's per-user state: API key, sessions, settings, MCP, hooks.
      - ./claude-home:/home/claude/.claude
      # claude-web's own state: usage log, last-seen rate-limit info.
      - ./claude-web-state:/home/claude/.claude-web
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:3001/healthz\").status==200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
